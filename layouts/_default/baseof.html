<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind (CDN). For production, replace with compiled CSS. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Typography: Poppins for a more modern, vibrant feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .hero-overlay {
      background: linear-gradient(to bottom, rgba(15,23,42,0.12), rgba(15,23,42,0.5));
    }
    .hero-title {
      text-shadow: 0 16px 40px rgba(15,23,42,0.7);
      letter-spacing: 0.03em;
    }
    .hero-subtitle {
      text-shadow: 0 10px 26px rgba(15,23,42,0.55);
    }
    .section-heading {
      letter-spacing: 0.04em;
    }
    .floating-whatsapp {
      z-index: 40;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 scroll-smooth text-[15px] leading-relaxed">
  {{ partial "header.html" . }}

  <main id="main-content" class="tracking-[0.01em]">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}
</body>
</html>
