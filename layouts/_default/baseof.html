<!DOCTYPE html>
<html lang="en" style="scroll-padding-top: 7rem;">
<head>
  <meta charset="UTF-8" />
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind (CDN for now; replace with compiled CSS in production) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Typography: Inter as elegant sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body { margin: 0; padding: 0; }
    /* scroll-padding-top set inline above to offset fixed h-28 (7rem) header */
    body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; scroll-behavior: smooth; }

    /* Hero fills full viewport height minus sticky header */
    .hero-fullscreen {
      height: calc(100dvh - 7rem);
      min-height: 480px;
    }

    /* Transparent top → readable dark bottom — same on mobile & desktop */
    .hero-overlay {
      background: linear-gradient(
        to bottom,
        rgba(15, 23, 42, 0.18) 0%,
        rgba(15, 23, 42, 0.45) 55%,
        rgba(15, 23, 42, 0.68) 100%
      );
    }

    /* Hero carousel slide transition */
    .hero-slide {
      transition: opacity 0.8s ease-in-out;
    }

    /* Dot indicators */
    .hero-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.45);
      transition: background 0.3s, width 0.3s;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    .hero-dot.active {
      background: rgba(255,255,255,0.95);
      width: 22px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  {{ partial "header.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Floating WhatsApp FAB — rendered at body level so z-index is never clipped by header stacking context -->
  <a href="{{ .Site.Params.links.whatsapp_booking }}"
     target="_blank"
     rel="noopener noreferrer"
     class="fixed bottom-5 right-4 md:hidden inline-flex items-center justify-center rounded-full bg-[#25D366] text-white shadow-xl shadow-green-500/40 h-14 w-14 hover:bg-[#1ebe5b] active:scale-95 transition-transform"
     style="z-index:9999;"
     aria-label="Book via WhatsApp">
    <svg class="h-7 w-7" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
      <path d="M20.52 3.48A11.76 11.76 0 0 0 12.01 0C5.73 0 .6 5.13.6 11.41c0 2.01.53 3.98 1.55 5.72L0 24l6.05-2.11a11.4 11.4 0 0 0 5.96 1.64h.01c6.28 0 11.41-5.13 11.41-11.41a11.3 11.3 0 0 0-3.91-8.64ZM12.02 21.2h-.01c-1.82 0-3.6-.49-5.16-1.42l-.37-.22-3.59 1.26 1.23-3.49-.24-.36a9.45 9.45 0 0 1-1.47-5.1c0-5.23 4.26-9.49 9.5-9.49a9.4 9.4 0 0 1 6.73 2.78 9.4 9.4 0 0 1 2.77 6.72c0 5.23-4.26 9.49-9.49 9.49Zm5.2-7.08c-.28-.14-1.65-.81-1.9-.9-.25-.09-.44-.14-.63.14-.19.28-.73.9-.9 1.08-.17.18-.33.2-.61.07-.28-.14-1.18-.44-2.25-1.41-.83-.74-1.4-1.66-1.56-1.94-.16-.28-.02-.43.12-.57.12-.12.28-.3.42-.45.14-.15.18-.25.27-.42.09-.18.05-.34-.02-.48-.07-.14-.63-1.52-.87-2.08-.23-.55-.47-.47-.64-.48h-.54c-.18 0-.48.07-.73.34-.25.27-.96.94-.96 2.29 0 1.35.99 2.66 1.13 2.84.14.19 1.95 2.98 4.72 4.17.66.29 1.18.47 1.58.6.66.21 1.27.18 1.75.11.53-.08 1.65-.68 1.88-1.34.23-.66.23-1.22.16-1.34-.07-.12-.26-.19-.54-.33Z" />
    </svg>
  </a>

  {{ partial "scripts.html" . }}
</body>
</html>
