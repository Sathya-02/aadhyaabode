<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind (CDN for now; replace with compiled CSS in production) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Typography: Inter as elegant sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
    .hero-overlay {
      background: radial-gradient(circle at top, rgba(15,23,42,0.8), rgba(15,23,42,0.95));
    }
    .floating-whatsapp {
      z-index: 40;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 scroll-smooth">
  {{ partial "header.html" . }}

  <main id="main-content" class="pt-28">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}
</body>
</html>
