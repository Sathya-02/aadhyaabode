<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind (CDN for now; replace with compiled CSS in production) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Typography: Inter as elegant sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }

    /* Hero fills full viewport height minus sticky header (h-16 = 4rem) */
    .hero-fullscreen {
      height: calc(100dvh - 4rem);
      min-height: 480px;
    }

    /* Light top-to-bottom overlay — image fully visible, text readable at bottom */
    .hero-overlay {
      background: linear-gradient(
        to bottom,
        rgba(15, 23, 42, 0.25) 0%,
        rgba(15, 23, 42, 0.50) 60%,
        rgba(15, 23, 42, 0.70) 100%
      );
    }

    .floating-whatsapp {
      z-index: 40;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 scroll-smooth">
  {{ partial "header.html" . }}

  <!-- No pt-* padding — hero sits flush below the sticky header -->
  <!-- Non-hero sections use scroll-mt-20 on the section element for anchor offset -->
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}
</body>
</html>
