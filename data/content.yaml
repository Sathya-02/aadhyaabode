amenities:
  heading: "All-In-One Comfort Services"
  description: "Everything you need for a seamless coastal vacation — from stay essentials to local guidance."
  items:
    - title: "Food & Dining"
      text: "Local culinary arrangements, homely meal options, or fully equipped kitchens for self-cooking."
    - title: "Transit Support"
      text: "Airport & railway station pickups and drop-offs on request with trusted partners."
    - title: "Local Exploration"
      text: "Bike and car rentals, curated itineraries for sunrise points, beaches, and temples."
