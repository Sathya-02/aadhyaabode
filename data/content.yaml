abodes_section:
  heading: "Our Abodes"
  description: "Fully furnished luxury Home for families, and groups."

amenities:
  heading: "All-In-One Comfort Services"
  description: "Everything you need for a seamless coastal vacation — from stay essentials to local guidance."
  items:
    - title: "Transit Support"
      text: "Airport & railway station pickups and drop-offs on request with trusted partners."
    - title: "Local Exploration"
      text: "Curated itineraries for sunrise points, beaches, and temples."
    - title: "Stay Perks"
      text: "High-speed Wi-Fi, 100% power backup, AC bedrooms, and secure gated premises."
    - title: "Food & Dining"
      text: "Kitchen equipped for self-cooking. Online Food delivery available for convinience - Swiggy and Zomato. Nearby Hotels and supermarkets in reach."

policies:
  heading: "Booking & Payment Policies"
  description: "Transparent, guest-first policies so you always know what to expect."
  columns:
    - title: "Check-in & Check-out"
      bullets:
        - "Standard check-in: 2:00 PM (flexible subject to availability)."
        - "Standard check-out: 11:00 AM."
        - "Government-approved ID proof mandatory for all guests."
        - "Early check-in / late check-out on prior request only."
    - title: "Payments"
      bullets:
        - "Advance payment required to confirm the booking."
        - "Remaining amount payable at or before check-in."
        - "UPI, bank transfer, and select wallet payments accepted."
        - "Detailed payment instructions will be shared on WhatsApp."
    - title: "Cancellation & Refunds"
      bullets:
        - "Free cancellation up to a certain number of days before check-in (customisable)."
        - "Partial refund window for late cancellations."
        - "No-show bookings are non-refundable."
        - "Exact policy details will be shared at time of booking."

location:
  heading: "Location & Nearby Highlights"
  description: "Stay minutes away from Kanyakumari’s iconic Vivekananda Rock, sunrise and sunset points, with easy access to major landmarks."
  bullets:
    - "Short drive to Vivekananda Rock Memorial & Thiruvalluvar Statue."
    - "Easy access to sunset viewpoints along the coastline."
    - "Convenient distance from Kanyakumari railway station & bus stand."
    - "Calm residential neighborhood away from tourist rush, yet well-connected."
  trusts:
    - title: "Guest Reviews"
      text: "Warm host, clean property, and perfect location for exploring Kanyakumari."
    - title: "Reservation Assurance"
      text: "Booking confirmations and check-in instructions shared directly on WhatsApp for complete clarity."
